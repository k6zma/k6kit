version: '3'

vars:
  GOLANGCI_LINT_VERSION: 'v2.8.0'
  GCI_VERSION: 'v0.13.7'
  GOFUMPT_VERSION: 'v0.9.2'
  BENCH_NO_FIELDS_MAX_NS: '260.0'
  BENCH_WITH_FIELDS_MAX_NS: '760.0'
  BENCH_WITH_CONTEXT_MAX_NS: '760.0'
  BENCH_WITH_OTEL_MAX_NS: '460.0'
  BENCH_DEBUG_DISABLED_MAX_NS: '25.0'

  BIN_DIR: '{{.ROOT_DIR}}/.bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install-linter:
    desc: Install golangci-lint into local bin directory
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - |
        [ -f {{.GOLANGCI_LINT}} ] || {
          echo "Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}"
          GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        }
    status:
      - test -x {{.GOLANGCI_LINT}}

  install-formatters:
    desc: Install gofumpt and gci into local bin directory
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - |
        [ -f {{.GOFUMPT}} ] || {
          echo "Installing gofumpt {{.GOFUMPT_VERSION}}"
          GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        }
      - |
        [ -f {{.GCI}} ] || {
          echo "Installing gci {{.GCI_VERSION}}"
          GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        }
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  install-all:
    desc: Install linter and formatters
    deps:
      - install-linter
      - install-formatters
    cmds:
      - echo "All install tasks completed"

  format-gofumpt:
    desc: Format Go files with gofumpt
    deps: [install-formatters]
    cmds:
      - echo "Formatting Go files with gofumpt"
      - find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +

  format-gci:
    desc: Reorder imports with gci
    deps: [install-formatters]
    cmds:
      - echo "Reordering imports with gci"
      - find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/k6zma/k6kit)" {} +

  format-golangci-fix:
    desc: Apply golangci-lint automatic fixes
    deps: [install-linter]
    cmds:
      - echo "Applying automatic fixes with golangci-lint"
      - '{{.GOLANGCI_LINT}} run --fix ./... --config=.golangci.yml'

  format-all:
    desc: Run all formatting and fix steps
    deps:
      - format-gofumpt
      - format-gci
      - format-golangci-fix
    cmds:
      - echo "Formatting pipeline completed"

  lint:
    desc: Run golangci-lint checks
    deps: [install-linter]
    cmds:
      - '{{.GOLANGCI_LINT}} run ./... --config=.golangci.yml'

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...

  test-log:
    desc: Run tests for logger package only
    cmds:
      - go test ./log

  test-race:
    desc: Run race detector tests for logger package
    cmds:
      - go test -race ./log

  test-cover:
    desc: Run coverage report using the same calculation as pre-commit
    cmds:
      - MIN_COVERAGE=0 bash ./scripts/coverage-guard.sh

  test-all:
    desc: Run full test suite including race and coverage
    deps:
      - test
      - test-race
      - test-cover
    cmds:
      - echo "All test tasks completed"

  benchmark:
    desc: Run all benchmarks for logger package
    cmds:
      - go test -run '^$' -bench . -benchmem ./log

  benchmark-info:
    desc: Run BenchmarkInfo* benchmarks for logger package
    cmds:
      - go test -run '^$' -bench '^BenchmarkInfo' -benchmem ./log

  benchmark-guard:
    desc: Run benchmark thresholds for pre-commit
    cmds:
      - |
        set -euo pipefail
        report_file=".bench-precommit.txt"

        go test -run '^$' -bench '^(BenchmarkInfoNoFields|BenchmarkInfoWithFields|BenchmarkInfoWithContext|BenchmarkInfoWithOTEL|BenchmarkDebugDisabled)$' -benchmem ./log > "$report_file"
        cat "$report_file"

        python3 - <<'PY'
        import re
        import sys

        report_path = ".bench-precommit.txt"
        text = open(report_path, "r", encoding="utf-8").read()

        limits = {
            "BenchmarkInfoNoFields": float("{{.BENCH_NO_FIELDS_MAX_NS}}"),
            "BenchmarkInfoWithFields": float("{{.BENCH_WITH_FIELDS_MAX_NS}}"),
            "BenchmarkInfoWithContext": float("{{.BENCH_WITH_CONTEXT_MAX_NS}}"),
            "BenchmarkInfoWithOTEL": float("{{.BENCH_WITH_OTEL_MAX_NS}}"),
            "BenchmarkDebugDisabled": float("{{.BENCH_DEBUG_DISABLED_MAX_NS}}"),
        }

        failed = False
        for name, limit in limits.items():
            match = re.search(rf"^{name}[-\\w]*\\s+\\d+\\s+([0-9]+(?:\\.[0-9]+)?)\\s+ns/op", text, re.MULTILINE)
            if not match:
                print(f"Missing benchmark output for {name}")
                failed = True
                continue

            value = float(match.group(1))
            if value > limit:
                print(f"Benchmark threshold exceeded: {name}={value:.3f} ns/op > {limit:.3f} ns/op")
                failed = True
            else:
                print(f"Benchmark within threshold: {name}={value:.3f} ns/op <= {limit:.3f} ns/op")

        if failed:
            sys.exit(1)
        PY

  coverage-guard:
    desc: Run coverage threshold check (minimum 70 percent)
    cmds:
      - MIN_COVERAGE=70.0 bash ./scripts/coverage-guard.sh

  precommit:
    desc: Run lint, tests, and benchmark threshold checks
    deps:
      - lint
      - test
      - test-race
      - coverage-guard
      - benchmark-guard
    cmds:
      - echo "Pre-commit checks completed successfully"

  ci:
    desc: Run local CI pipeline
    deps:
      - format-all
      - lint
      - test-all
      - coverage-guard
      - benchmark-guard
    cmds:
      - echo "CI pipeline completed"
